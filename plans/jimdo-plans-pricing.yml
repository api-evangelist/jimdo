name: Jimdo Plans and Pricing
description: Jimdo offers tiered website builder and ecommerce plans for small businesses.
  Plans range from a free tier to premium unlimited options, with separate tracks
  for AI-powered Dolphin builder and the template-based Creator editor.
url: https://www.jimdo.com/pricing/
created: '2026-06-13'
modified: '2026-06-13'

plans:

  # Jimdo Dolphin (AI Builder) - Website Plans
  - name: Play
    description: Free website plan with basic features and Jimdo branding.
    url: https://www.jimdo.com/pricing/website/
    price: 0
    currency: USD
    billingCycle: monthly
    features:
      - 5 pages
      - 500 MB storage
      - 2 GB bandwidth
      - Contact forms
      - Free stock images
      - Jimdo branding included

  - name: Start
    description: Entry-level paid plan with custom domain and core SEO tools.
    url: https://www.jimdo.com/pricing/website/
    price: 11
    currency: USD
    billingCycle: monthly
    features:
      - 10 pages
      - 5 GB storage
      - 10 GB bandwidth
      - Custom domain
      - Business email
      - SEO tools
      - Analytics

  - name: Grow
    description: Mid-tier plan with expanded pages and priority support.
    url: https://www.jimdo.com/pricing/website/
    price: 17
    currency: USD
    billingCycle: monthly
    features:
      - 50 pages
      - 15 GB storage
      - 20 GB bandwidth
      - Custom domain
      - 4-hour support response
      - 5 email forwarding addresses

  - name: Unlimited
    description: Full-featured website plan with unlimited pages and storage.
